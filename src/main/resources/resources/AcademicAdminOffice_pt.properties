diploma.supplement.eight.6.asteriscs = (*) Exceptuam-se os casos em que seja indispensßvel, para o acesso ao exercĒcio de determinada actividade profissional, uma formańŃo compreendida entre 210 e 240 ECTS\n(**) Excepcionalmente, e sem prejuĒzo de ser assegurada a satisfańŃo de todos os requisitos relacionados com a caracterizańŃo dos objectivos do grau e das suas condiń§es de obtenńŃo, o ciclo de estudos conducente ao grau de mestre numa especialidade pode ter 60 crķditos em consequĻncia de uma prßtica estßvel e consolidada internacionalmente nessa especialidade\n(***) O grau de mestre pode igualmente ser conferido ap¾s um ciclo de estudos integrado, nos casos em que, para o acesso ao exercĒcio de uma determinada actividade profissional, essa durańŃo: a) seja fixada por normas legais da UniŃo Europeia e; b) resulte de uma prßtica estßvel e consolidada na UniŃo Europeia. Nestes casos, o grau de licenciado ķ atribuĒdo aos alunos que tenham realizado 180 ECTS (3 anos, 6 semestres).
diploma.supplement.eight.body = A descrińŃo do Sistema Nacional PortuguĻs de Ensino Superior, disponibilizado oficialmente pelo NARIC (National Academic Recognition Information Centres) ķ a seguinte:\n\nA Lei de Bases do Sistema Educativo (Lei n║ 46/86, de 14 de Outubro, posteriormente alterada, nalguns dos seus articulados pelas Leis n║s 115/97, de 19 de Setembro, e 49/2005, de 30 de Agosto, republicada e renumerada em anexo Ó ·ltima), estabelece o quadro geral do sistema educativo. A educańŃo escolar desenvolve-se em trĻs nĒveis: os ensinos bßsicos, secundßrio e superior. A educańŃo prķ - escolar ķ facultativa e destina-se Ós crianńas com idade compreendida entre os 3 anos e a idade de ingresso no ensino bßsico. O ensino bßsico ķ universal, obrigat¾rio e gratuito e compreende trĻs ciclos sequenciais, sendo o 1.║ de quatro anos, o 2.║ de dois e o 3.║ de trĻs. O ensino secundßrio ķ facultativo e compreende um ciclo de trĻs anos (10.║, 11.║ e 12.║ anos de escolaridade).
