diploma.supplement.eight = 8. InformańŃo sobre o sistema nacional de ensino superior
diploma.supplement.eight.1 = OrganizańŃo do ensino superior
diploma.supplement.eight.1.1 = Grau de Licenciado
diploma.supplement.eight.1.1.body = As instituiń§es universitßrias e politķcnicas conferem o grau de licenciado. O ciclo de estudos conducente ao grau de licenciado no ensino politķcnico tem uma durańŃo normal de seis semestres curriculares de trabalho dos alunos correspondentes a 180 crķditos, e, excepcionalmente, em casos cobertos por normas jurĒdicas nacionais ou da UniŃo Europeia, uma durańŃo normal de atķ sete ou oito semestres curriculares de trabalho e uma formańŃo de atķ 240 crķditos. O ciclo de estudos conducente ao grau de licenciado no ensino universitßrio tem 180 ou 240 crķditos e uma durańŃo normal compreendida entre seis e oito semestres curriculares de trabalho dos alunos. No 1.║ ciclo de estudos das instituiń§es universitßrias ou politķcnicas o grau de licenciado ķ conferido aos que, atravķs da aprovańŃo em todas as unidades curriculares que integram o plano de estudos do curso de licenciatura, tenham obtido o n·mero de crķditos fixado.
diploma.supplement.eight.1.2 = Grau de Mestre
diploma.supplement.eight.1.2.body = As instituiń§es universitßrias e politķcnicas conferem o grau de mestre. O ciclo de estudos conducente ao grau de mestre tem 90 a 120 crķditos e uma durańŃo normal compreendida entre trĻs e quatro semestres curriculares de trabalho dos alunos. No ensino politķcnico o ciclo de estudos conducente ao grau de mestre deve assegurar, predominantemente, a aquisińŃo de uma especializańŃo de natureza profissional. No ensino universitßrio o ciclo de estudos conducente ao grau de mestre deve assegurar, predominantemente, a aquisińŃo de uma especializańŃo de natureza acadķmica com recurso Ó actividade de investigańŃo ou que aprofunde competĻncias profissionais. No ensino universitßrio o grau de mestre pode igualmente ser conferido ap¾s um ciclo de estudos integrado, com 300 a 360 crķditos e uma durańŃo normal compreendida entre 10 e 12 semestres curriculares de trabalho nos casos em que a durańŃo para o acesso ao exercĒcio de uma determinada actividade profissional seja fixada por normas legais da UniŃo Europeia ou resulte de uma prßtica estßvel e consolidada na UniŃo Europeia. Neste ciclo de estudos ķ conferido o grau de licenciado aos que tenham realizado os 180 crķditos correspondentes aos primeiros seis semestres curriculares de trabalho. No 2.║ ciclo de estudos das instituiń§es universitßrias ou politķcnicas o grau de mestre ķ conferido aos que atravķs da aprovańŃo em todas as unidades curriculares que integram o plano de estudos do curso de mestrado e da aprovańŃo no acto p·blico de defesa da dissertańŃo, do trabalho de projecto ou do relat¾rio de estßgio, tenham obtido o n·mero de crķditos fixado.
diploma.supplement.eight.1.3 = Grau de Doutor
diploma.supplement.eight.1.3.body = O grau de doutor ķ conferido pelas instituiń§es universitßrias aos que tenham obtido aprovańŃo nas unidades curriculares do curso de doutoramento quando exista, e no acto p·blico de defesa da tese.
diploma.supplement.eight.1.body = O ensino superior portuguĻs compreende o ensino universitßrio e o ensino politķcnico. O ensino universitßrio ķ ministrado em instituiń§es universitßrias p·blicas, particulares ou cooperativas e concordatßrias e o ensino politķcnico em instituiń§es de ensino superior nŃo universitßrias p·blicas e particulares e cooperativas. Os estabelecimentos de ensino particular e cooperativo obtĻm reconhecimento prķvio do Ministķrio da CiĻncia, Tecnologia e Ensino Superior.
diploma.supplement.eight.2 = Condiń§es de Acesso
diploma.supplement.eight.2.1 = Regime geral de acesso ao 1║ ciclo de estudos
diploma.supplement.eight.2.1.body = Para se candidatarem ao 1.║ ciclo de estudos conducente ao grau de licenciado atravķs do regime geral, os estudantes nacionais e estrangeiros devem satisfazer as seguintes condiń§es: ter aprovańŃo num curso de ensino secundßrio ou habilitańŃo nacional ou estrangeira legalmente equivalente; ter realizado as provas de ingresso exigidas para o curso a que se candidata com a classificańŃo igual ou superior Ó mĒnima fixada (Hß instituiń§es de ensino superior que aceitam provas ou exames estrangeiros); satisfazer os prķ-requisitos exigidos (se aplicßvel) para o curso a que se candidata. 
diploma.supplement.eight.2.2 = Regimes especiais de acesso
diploma.supplement.eight.2.2.body = Para alķm do regime geral existem regimes especiais de acesso ao ensino superior para atletas de alta competińŃo, cidadŃos portugueses em missŃo oficial no estrangeiro, funcionßrios nacionais e estrangeiros em missŃo diplomßtica, oficiais das Forńas Portuguesas e bolseiros no quadro dos acordos de cooperańŃo firmados pelo Estado PortuguĻs.
diploma.supplement.eight.2.3 = Concursos especiais
diploma.supplement.eight.2.3.body = Para alķm do regime geral e dos regimes especiais hß concursos especiais para candidatos que re·nam condiń§es habilitacionais especĒficas possibilitando o ingresso no ensino superior a novos p·blicos numa l¾gica de aprendizagem ao longo da vida: \n-Adultos maiores de 23 anos que tenham obtido aprovańŃo em provas especialmente adequadas destinadas a avaliar a capacidade para a frequĻncia do ensino superior;\n-Titulares de um curso de especializańŃo tecnol¾gica (curso p¾s-secundßrio nŃo superior). O ingresso em cada instituińŃo de ensino superior estß sujeito a numerus clausus.
diploma.supplement.eight.3 = Ingresso no 2║ ciclo de estudos
diploma.supplement.eight.3.body = Podem candidatar-se ao ingresso no 2║ ciclo de estudos conducentes ao grau de mestre:\n-Titulares de grau de licenciado ou equivalente legal;\n-Titulares de um grau acadķmico superior estrangeiro, que seja reconhecido como satisfazendo os objectivos do grau de licenciado pelo ¾rgŃo cientĒfico estatutariamente competente do estabelecimento de ensino superior onde pretendem ser admitidos;\n-Detentores de currĒculo escolar, cientĒfico ou profissional, que seja reconhecido como atestando capacidade para realizańŃo deste ciclo de estudos pelo ¾rgŃo cientĒfico estatutariamente competente do estabelecimento de ensino superior onde pretendem ser admitidos.
