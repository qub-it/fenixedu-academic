diploma.supplement.eight.4.body = Podem candidatar-se ao ingresso no 3║ ciclo de estudos conducentes ao grau de doutor:\n-Titulares de grau de mestre ou equivalente legal;\n-Titulares de grau de licenciado detentores de um currĒculo escolar ou cientĒfico especialmente relevante, que seja reconhecido como atestando capacidade para realizańŃo deste ciclo de estudos pelo ¾rgŃo cientĒfico legal e estatutariamente competente da universidade onde pretendem ser admitidos;\n-Detentores de currĒculo escolar, cientĒfico ou profissional, que seja reconhecido como atestando capacidade para realizańŃo deste ciclo de estudos pelo ¾rgŃo cientifico legal e estatutariamente competente da universidade onde pretendem ser admitidos.
