label.teacher.viewExecutionCourseProjects.atomicDescription = Este tipo de inscriçăo obriga os alunos formarem os grupos pessoalmente antes de se inscreverem. A inscriçăo dos alunos num grupo é feita em simultâneo por um único aluno. Os alunos podem-se inscrever e retirar dos grupos desde que năo violem o número mínimo/máximo de alunos que o agrupamento permite
