label.teacher.insertGroupProperties.description = <p>Nesta pßgina pode definir as propriedades para o novo agrupamento.</p><p><ul><li><b>InscrińŃo Automßtica</b> - Ao seleccionar este atributo, faz com que os atributos abaixo sejam preenchidos automaticamente, sendo que o campo <em>Mßximo de Grupos</em> fica preenchido com o n║ de alunos com frequĻncia Ó disciplina. A selecńŃo deste atributo farß tambķm com que aquando da associańŃo deste grupo a um projecto (no men· da avaliań§es), todos os alunos da disciplina sejam automaticamente inscritos no grupo. Caso o grupo jß tenha alunos inscritos nŃo serß possĒvel definir esta opńŃo, na sua edińŃo.</li></ul></p><p><strong>Nota:</strong> Existem duas polĒticas de inscrińŃo ATėMICA e INDIVIDUAL.</p><ul><li>ATėMICA significa que os alunos devem inscrever-se em simultŌneo no grupo e o n·mero de elementos deve ser maior ou igual do que a capacidade mĒnima e menor ou igual que a mßxima. No caso do grupo jß existir, poderŃo haver posteriores inscriń§es individuais, desde que a capacidade mßxima nŃo seja ultrapassada. Se algum aluno se quiser desinscrever, poderß fazĻ-lo desde que o grupo permaneńa com a capacidade mĒnima.</li><li>INDIVIDUAL significa que os alunos inscrevem-se individualmente nos grupos, desde que a capacidade mßxima nŃo seja ultrapassada. Se um aluno quiser desincrever-se pode fazĻ-lo sempre, mesmo que o n·mero de elementos do grupo fique menor que a capacidade mĒnima.</li></ul><p>Capacidade Diferenciada: Esta opńŃo s¾ pode ser utilizada na criańŃo de agrupamentos associados a Turnos. Permite, que o n·mero mßximo de grupos, definido pada cada turno, possa ser diferenciado no(s) turno(s) pretendido(s).</p>
