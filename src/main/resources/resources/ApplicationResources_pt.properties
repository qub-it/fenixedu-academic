message.showTests.information = Na seguinte tabela estŃo as fichas que jß foram criadas.<br/>Aqui pode, com a opńŃo <b>Criar Ficha</b>, criar uma nova ficha de trabalho. Pode tambķm <b>Editar</b> para visualizar ou alterar a ficha, <b>Remover</b> a ficha, ou <b>Duplicar</b> a ficha se desejar criar uma nova ficha igual. Poderß ainda <b>Distribuir</b> a ficha pelos alunos inscritos na disciplina.
