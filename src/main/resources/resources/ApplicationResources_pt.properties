message.invalid.password = <div class="pass_warning"><p><strong>Atençăo:</strong> o sistema gestăo de passwords foi alvo de uma mudança com vista a optimizar a segurança do sistema e dos utilizadores. A implementaçăo deste novo sistema traz um novo conjunto de requisitos associado ao formato das passwords. <br/> A sua password actual viola algum(s) desses requisitos, por essa razăo foi redireccionado para esta página sendo essencial actualizar a password antes de voltar a entrar na aplicaçăo. Agradecemos a sua compreensăo.</p><p>Para mais esclarecimentos consultar <a href="https://ciist.ist.utl.pt/normas/autenticacao.php" target="_blank">"Autenticaçăo e Normas de Utilizaçăo de Passwords (FAQ)"</a> ou contactar <a href="mailto:suporte@dot.ist.utl.pt">suporte@dot.ist.utl.pt</a></p></div>
