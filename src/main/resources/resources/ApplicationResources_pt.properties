label.identification.card = Cartăo do Técnico
label.identification.card.instructions.student = Todos os utilizadores do {1} que pretendam solicitar um novo cartăo deverăo seguir os seguintes passos:\n    1. Ir ao <a href="{0}">portal da SIBS / SANTANDER</a>, e completar o formulário pré-preechido que lhe é apresentado. É estritamente proíbido alterar o campo Nş de Aluno/Mecanográfico, dado que qualquer alteraçăo é impeditiva da produçăo do cartăo. Deverá verificar se o campo "Nome a gravar no cartăo" está correcto; em alguns casos o nome é truncado por razőes de espaço, e deverá ser editado pelo utilizador de modo a ficar num formato mais adequado;\n    2. Submeter o formulário;\n    3. Reter o número de pedido que lhe é apresentado. Aconselha-se a impressăo da página que lhe é apresentada no final deste processo.\n    4.  Dirigir-se ao Banco Santander Totta para validar o pedido de cartăo. Recomenda-se a utilizaçăo do balcăo situado dentro do Instituto Superior Técnico.\n
label.identification.card.instructions.teacher.employee = Todos os funcionários e docentes do {1} que pretendam solicitar um novo cartăo deverăo aceder através do link:\n    <a href="https://ensinosuperior.santanderuniversidadesportugal.com/web/ist.action">https://ensinosuperior.santanderuniversidadesportugal.com/web/ist.action</a>,\na uma plataforma de agendamentos com vista a ser recebido por um gestor do Banco Santander Totta, em data e hora da sua preferęncia (dentro das disponibilidades do gestor) para proceder ao seu pedido de cartăo de identificaçăo do IST.\n\nAlternativamente, poderá preencher <a href="{0}">este formulário</a>, imprimi-lo e proceder ŕ sua entrega nos serviços da Direçăo de Recursos Humanos (DRH) no seu Campus.
label.identification.card.production.state.one = Os seus dados ainda năo foram enviados para a SIBS / SANTANDER, ou porque năo é elegível a ter um cartăo ou porque os seus dados pessoais ou profissionais năo estăo devidamente registados no sistema.
label.identification.card.production.state.three = A SIBS / SANTANDER emitiu o seu cartăo no dia {0}. \nSe o cartăo năo for bancário será enviado para o balcăo do banco SANTANDER dentro de poucos dias onde poderá proceder ao seu levantamento, caso contrário será enviado para a sua morada.
label.identification.card.production.state.two = A SIBS / SANTANDER recebeu os seus dados pessoais para emitir o cartăo no dia {0}. A SIBS ainda năo emitiu o seu cartăo. Para proceder ŕ sua emissăo deverá seguir as instruçőes acima indicadas.
