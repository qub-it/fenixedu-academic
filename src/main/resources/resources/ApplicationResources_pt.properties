label.teacher.viewExecutionCourseProjects.individualPolicy = Política Individual
label.teacher.viewProjects.instructions = <p><em>Conceitos Gerais</em></p><p><strong>Agrupamento:</strong> um agrupamento é o grupo (que terá o nome do trabalho ou projecto) que engloba os grupos de alunos.</p><p><strong>Grupo:</strong> grupo formado por alunos dentro de um agrupamento.</p><p style="margin-top: 1em;"><em>Tipos de Agrupamento</em></p><p><strong>Política Atómica:</strong> Este tipo de inscriçăo obriga os alunos formarem os grupos pessoalmente antes de se inscreverem. A inscriçăo dos alunos num grupo é feita em simultâneo por um único aluno. Os alunos podem-se inscrever e retirar dos grupos desde que năo violem o número mínimo/máximo de alunos que o agrupamento permite.</p><p><strong>Política Individual:</strong> Este tipo de inscriçăo permite aos alunos inscreverem-se e retirarem-se dos grupos individual e livremente desde que năo ultrapassem o valor do número máximo de alunos permitido.</p>
