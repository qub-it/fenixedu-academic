message.insertNewExercise.information = Aqui poderá inserir novos exercícios. Os exercícios aceites por este sistema seguem a especifiçăo <b>Question and Test Interoperability</b> (versăo 1.2) da <b>IMS</b>.<br/>Numa primeira fase, săo apenas suportados os exercícios que contenham conteúdos em formato texto (<mattext>) ou imagem (<matimage>). Para além disso estas imagens deverăo estar embebidas no exercício em BASE64. Neste momento săo suportadas perguntas de escolha múltipla, resposta múltipla, texto e numéricas.<br/>Os ficheiros em formato XML, correspondentes ŕs variaçőes do exercício, deverăo ser inseridos em formato ZIP ou em formato XML, se for apenas uma variaçăo.<br/>O ficheiro de metadata correspondente ao exercício năo é obrigatório e segue a especificaçăo <b>Meta-data</b> (versăo 1.2) também da IMS.<br/><br/>Poderá consultar ambas as especifiçăo no site da <a href="http://www.imsglobal.org" target="_blank">IMS</a>.
