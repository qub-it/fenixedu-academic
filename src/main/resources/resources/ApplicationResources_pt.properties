message.tests.instructions = <ul style="list-style: square;"><li>A opçăo <strong>Criar Ficha</strong> permite criar novas fichas de trabalho.</li><li class="nobullet"><br/></li><li>Com a opçăo <strong>Listar Fichas</strong> poderá criar, visualizar, alterar, remover, e distribuir as fichas de trabalho existentes.</li><li class="nobullet"><br/></li><li><strong>Listar Fichas Distribuídas</strong> permite gerir as fichas que já foram distribuídas.</li><li class="nobullet"><br/></li><li><b>Criar Exercício</b> possibilita a criaçăo de novos exercícios no sistema ou adicionar variaçőes a um exercício já existente.</li><li class="nobullet"><br/></li><li><b>Importar Exercício</b> permite inserir novos exercícios no sistema.</li><li class="nobullet"><br/></li><li>Com a opçăo <b>Listar Exercícios</b> poderá  inserir, editar, adicionar variaçőes ou remover os exercícios.</li><li class="nobullet"><br/><br/></li><li>A opçăo <strong>Administraçăo da Disciplina</strong> permite voltar para o menu de administraçăo de disciplinas.</li></ul>
message.tests.instructionsIntroduction1 = Nesta área é possível construir e distribuir fichas de trabalho pelos alunos, para serem respondidas e resolvidas online, com correcçăo automática. As fichas podem ser utilizadas para: i) avaliaçăo, contínua ou auto-avaliaçăo; ou para ii) realizar inquéritos aos alunos.<br/>Incluem exercícios de escolha múltipla, resposta múltipla, texto e numéricas
message.tests.instructionsIntroduction2 = <br/><br/>Os exercícios, que văo compor as fichas, devem ser importados para o sistema e devem estar no formato standard QTI (versăo 1.2) da IMS. No entanto, este sistema năo abrange a totalidade da especificaçăo e alguns campos e funcionalidades foram suprimidos.<br/><br/>Para a criaçăo de exercícios, a DSI desenvolveu duas ferramentas:<ul><li>Interna, que pode ser encontrada em "Criar Exercício".</li><li>LEIA que está sustentada no Mathematica e permite gerar quantas variaçőes se queira a partir de uma única pergunta-modelo.<br/>Para obter mais informaçőes sobre esta ferramenta contactar a DSI para o e-mail <a href="mailto:dsi@ist.utl.pt">dsi@ist.utl.pt</a>.</li></ul><br/><br/>Existem ainda outras ferramentas disponíveis para a criaçăo e distribuiçăo destes exercícios, que podem ser consultadas em: <a href="http://en.wikipedia.org/wiki/QTI#Applications_with_IMS_QTI_support" target="_blank">http://en.wikipedia.org/wiki/QTI#Applications_with_IMS_QTI_support</a>.<br/><br/><h2>Funcionalidades</h2><ul><li>Criar Ficha - permite criar uma nova ficha de trabalho.</li><li>Listar Fichas - permite criar, distribuir, visualizar, alterar e remover as fichas de trabalho existentes.</li><li>Listar Fichas Distribuídas - permite gerir as fichas que já foram distribuídas aos alunos.</li><li>Criar Exercício - possibilita a criaçăo de novos exercícios no sistema ou adicionar variaçőes a um exercício já existente.</li><li>Importar Exercício - permite inserir novos exercícios no sistema.</li><li>Listar Exercícios - permite inserir, alterar e adicionar variaçőes ou remover os exercícios.</li></ul><br/><br/>Actualmente, năo estăo a ser desenvolvidas novas funcionalidades.<br/>No entanto, é garantido o apoio na resoluçăo de problemas ou correcçőes necessárias.
