message.rss.1 = Pode receber informaçăo referente a cada disciplina do {0} através de RSS. Basta subscrever ao <em>feed</em> no seu leitor RSS preferido.
message.rss.2 = O que é o RSS?
message.rss.3 = RSS (Really Simple Syndication ou Rich Site Summary) é um formato baseado na linguagem XML. Ao subscrever ŕs fontes de informaçăo (feeds) RSS dos sites a que pretende estar actualizado, passa a ter acesso aos seus conteúdos num interface comum, o do leitor RSS, já năo precisa de os visitar um por um para estar a par das últimas actualizaçőes.
