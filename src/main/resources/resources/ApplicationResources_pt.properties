label.executionCourse.instructions00.intro = Neste portal poderá gerir as Unidades Curriculares que se encontra a leccionar.
label.executionCourse.instructions01.communication = A secçăo <b>Comunicaçăo</b> permite definir o URL da página da cadeira e o contacto.
label.executionCourse.instructions02.announcements = Poderá gerir os <b>Anúncios</b> (acrescentar, editar ou apagar) escolhendo a opçăo correspondente.
label.executionCourse.instructions03.sections = Tem ainda a possibilidade de criar <b>Secçőes</b> (e sub-secçőes opcionais) nas páginas da disciplina para conterem informaçăo como listas de problemas, material de apoio, etc.
label.executionCourse.instructions04.summaries = Poderá introduzir os <b>Sumários</b> referentes ŕs suas aulas, e inclusivamente criar o sumário a partir de um sumário/planeamento já existente.
label.executionCourse.instructions05.teachers = Se existirem outros docentes a leccionar a disciplina podem ser indicados através da opçăo <b>Docentes</b>, permitindo a estes administrar também a página da disciplina.
label.executionCourse.instructions06.students = A opçăo <b>Alunos</b> permite obter, sob a forma de uma tabela, listas com informaçăo dos alunos a frequentar a disciplina. É possível filtrar a lista de modo a obter apenas os alunos inscritos num determinado turno. O sistema permite também enviar uma mensagem de correio electrónico para os todos os alunos da lista visível num determinado momento, assim como exportar a lista para uma folha de cálculo.
label.executionCourse.instructions07.planning = O <b>Planeamento</b> permite elaborar um plano para as aulas que irá leccionar durante o semestre. Para facilitar a criaçăo do planeamento é possível importar sumários ou planos de aula já criados em anos anteriores, e posteriormente fazer alteraçőes.
label.executionCourse.instructions08.evaluation = Em <b>Avaliaçăo</b> pode introduzir e alterar notas, afixar notas na página da disciplina e submeter as notas ŕ Secretaria. Pode também marcar Testes fora do período de Exames.
label.executionCourse.instructions09.objectives = As opçőes <b>Objectivos</b>, <b>Programa</b>, <b>Métodos de Ensino e Avaliaçăo</b> e <b>Bibliografia</b> devem ser preenchidas e/ou actualizadas (note que no caso das disciplinas básicas, os objectivos, o programa e os métodos de avaliaçăo săo da responsabilidade do Conselho Científico) pois para além de serem disponibilizadas nas páginas da disciplina, também servem para os relatórios e avaliaçőes das licenciaturas.
label.executionCourse.instructions10.groups = Se o desejar, pode efectuar a gestăo de <b>Grupos</b>, criando e editando agrupamentos da disciplina, podendo ainda exportá-los para outra(s) disciplina(s). Dentro de cada agrupamento pode-se visualizar, criar e apagar grupos, com alunos pertencentes a um conjunto que pode gerir. Cada grupo pode estar associado a um turno alterável e os elementos do grupo podem ser modificados de acordo com as permissőes dadas pelo conjunto.
