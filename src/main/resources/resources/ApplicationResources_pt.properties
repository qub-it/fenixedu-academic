message.showDistributedTests.information = Na tabela seguinte estŃo apresentados as fichas de trabalho que jß foram distribuĒdas pelos alunos. Poderß efectuar alterań§es pressionando no <b>TĒtulo da ficha</b> correspondente Ó ficha que pretende alterar.<br/>Pode visualizar estatĒsticas referentes a uma ficha escolhendo a opńŃo <b>EstatĒsticas</b>. Para visualizar as pautas, as fichas correspondentes a cada aluno e respectivos logs escolha a opńŃo <b>Pauta</b>.<br/>Poderß tambķm ar um conjunto de pautas para um ficheiro Excel. Para tal seleccione as pautas que deseja e escolha a opńŃo <b>Exportar</b>.
message.showExercise.information = Aqui sŃo apresentadas algumas informań§es sobre o exercĒcio e um exemplo de uma variańŃo.<br/>Poderß inserir, escolher a cotańŃo, forma de correcńŃo e a posińŃo do exercĒcio na ficha. Poderß sempre remover o exercĒcio, alterar a cotańŃo, forma de correcńŃo ou a posińŃo do mesmo na ficha editando a ficha.
