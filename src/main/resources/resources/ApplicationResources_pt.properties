label.identification.card.instructions.student = Todos os utilizadores do {1} que pretendam solicitar um novo cartŃo deverŃo seguir os seguintes passos:\n    1. Ir ao <a href="{0}">portal da SIBS / SANTANDER</a>, e completar o formulßrio prķ-preechido que lhe ķ apresentado. ╔ estritamente proĒbido alterar o campo N║ de Aluno/Mecanogrßfico, dado que qualquer alterańŃo ķ impeditiva da produńŃo do cartŃo. Deverß verificar se o campo "Nome a gravar no cartŃo" estß correcto; em alguns casos o nome ķ truncado por raz§es de espańo, e deverß ser editado pelo utilizador de modo a ficar num formato mais adequado;\n    2. Submeter o formulßrio;\n    3. Reter o n·mero de pedido que lhe ķ apresentado. Aconselha-se a impressŃo da pßgina que lhe ķ apresentada no final deste processo.\n    4.  Dirigir-se ao Banco Santander Totta para validar o pedido de cartŃo. Recomenda-se a utilizańŃo do balcŃo situado dentro do Instituto Superior Tķcnico.\n
