message.tests.instructions = <ul style="list-style: square;"><li>A opńŃo <strong>Criar Ficha</strong> permite criar novas fichas de trabalho.</li><li class="nobullet"><br/></li><li>Com a opńŃo <strong>Listar Fichas</strong> poderß criar, visualizar, alterar, remover, e distribuir as fichas de trabalho existentes.</li><li class="nobullet"><br/></li><li><strong>Listar Fichas DistribuĒdas</strong> permite gerir as fichas que jß foram distribuĒdas.</li><li class="nobullet"><br/></li><li><b>Criar ExercĒcio</b> possibilita a criańŃo de novos exercĒcios no sistema ou adicionar variań§es a um exercĒcio jß existente.</li><li class="nobullet"><br/></li><li><b>Importar ExercĒcio</b> permite inserir novos exercĒcios no sistema.</li><li class="nobullet"><br/></li><li>Com a opńŃo <b>Listar ExercĒcios</b> poderß  inserir, editar, adicionar variań§es ou remover os exercĒcios.</li><li class="nobullet"><br/><br/></li><li>A opńŃo <strong>AdministrańŃo da Disciplina</strong> permite voltar para o menu de administrańŃo de disciplinas.</li></ul>
message.tests.instructionsIntroduction1 = Nesta ßrea ķ possĒvel construir e distribuir fichas de trabalho pelos alunos, para serem respondidas e resolvidas online, com correcńŃo automßtica. As fichas podem ser utilizadas para: i) avaliańŃo, contĒnua ou auto-avaliańŃo; ou para ii) realizar inquķritos aos alunos.<br/>Incluem exercĒcios de escolha m·ltipla, resposta m·ltipla, texto e numķricas
message.tests.instructionsIntroduction2 = <br/><br/>Os exercĒcios, que vŃo compor as fichas, devem ser importados para o sistema e devem estar no formato standard QTI (versŃo 1.2) da IMS. No entanto, este sistema nŃo abrange a totalidade da especificańŃo e alguns campos e funcionalidades foram suprimidos.<br/><br/>Para a criańŃo de exercĒcios, a DSI desenvolveu duas ferramentas:<ul><li>Interna, que pode ser encontrada em "Criar ExercĒcio".</li><li>LEIA que estß sustentada no Mathematica e permite gerar quantas variań§es se queira a partir de uma ·nica pergunta-modelo.<br/>Para obter mais informań§es sobre esta ferramenta contactar a DSI para o e-mail <a href="mailto:dsi@ist.utl.pt">dsi@ist.utl.pt</a>.</li></ul><br/><br/>Existem ainda outras ferramentas disponĒveis para a criańŃo e distribuińŃo destes exercĒcios, que podem ser consultadas em: <a href="http://en.wikipedia.org/wiki/QTI#Applications_with_IMS_QTI_support" target="_blank">http://en.wikipedia.org/wiki/QTI#Applications_with_IMS_QTI_support</a>.<br/><br/><h2>Funcionalidades</h2><ul><li>Criar Ficha - permite criar uma nova ficha de trabalho.</li><li>Listar Fichas - permite criar, distribuir, visualizar, alterar e remover as fichas de trabalho existentes.</li><li>Listar Fichas DistribuĒdas - permite gerir as fichas que jß foram distribuĒdas aos alunos.</li><li>Criar ExercĒcio - possibilita a criańŃo de novos exercĒcios no sistema ou adicionar variań§es a um exercĒcio jß existente.</li><li>Importar ExercĒcio - permite inserir novos exercĒcios no sistema.</li><li>Listar ExercĒcios - permite inserir, alterar e adicionar variań§es ou remover os exercĒcios.</li></ul><br/><br/>Actualmente, nŃo estŃo a ser desenvolvidas novas funcionalidades.<br/>No entanto, ķ garantido o apoio na resoluńŃo de problemas ou correcń§es necessßrias.
