message.coordinator.thesis.collectBasicInformation = O aluno em questăo năo tem um tema atribuído no sistema. Neste ecră terá que indicar o título do tema que o aluno está a desenvolver.  Esse título será usado apenas para formalizar a proposta de júri. <br/> Opcionalmente pode adicionar um comentário a indicar a razăo que leva o aluno a năo ter um tema previamente atribuído.
message.coordinator.thesis.confirm.process = O júri foi aprovado. Após o aluno efectuar a discussăo da dissertaçăo este deverá introduzir a informaçăo final, relativa ŕ sua dissertaçăo, bem como os documentos da dissertaçăo e resumo alargado. O coordenador deve confirmar a informaçăo introduzida pelo aluno, deve ter na sua posse a ficha de identificaçăo (gerada pelo aluno) e a acta da discussăo com a avaliaçăo da dissertaçăo. Deve ainda proceder ŕ introduçăo da nota nesta página para que o Conselho Científico possa homologar a acta.
message.coordinator.thesis.confirmed.process = Os documentos da dissertaçăo estăo confirmados. A acta da discussăo deverá seguir para o Conselho Científico de modo a que este a possa homologar.
