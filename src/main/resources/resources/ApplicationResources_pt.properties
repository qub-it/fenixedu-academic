message.showAvailableQuestions.information = Na seguinte tabela estăo os exercícios disponíveis para inserir na ficha de trabalho.<br/><br/>Se primir na descriçăo de um exercício, poderá ver outras informaçőes disponíveis acerca do exercício, ver um exemplo de uma variaçăo e poderá também inseri-lo na ficha.<br/>Para inserir exercícios na ficha de trabalho, seleccione os exercícios que pretende e escolha <b>Inserir</b>.<br/><br/>Após inserir os exercícios que pretende, prima <b>Continuar</b> para ver a ficha e onde poderá alterar a cotacăo ou a posicăo dos exercícios da ficha. Poderá sempre voltar a esta página se desejar inserir novos exercícios.<br/>Se desejar cancelar, prima <b>Remover Ficha</b>.
message.showAvailableQuestionsForChange.information = Na seguinte tabela estăo os exercícios disponíveis para trocar pelo exercício seleccionado.
message.showDistributedTests.information = Na tabela seguinte estăo apresentados as fichas de trabalho que já foram distribuídas pelos alunos. Poderá efectuar alteraçőes pressionando no <b>Título da ficha</b> correspondente ŕ ficha que pretende alterar.<br/>Pode visualizar estatísticas referentes a uma ficha escolhendo a opçăo <b>Estatísticas</b>. Para visualizar as pautas, as fichas correspondentes a cada aluno e respectivos logs escolha a opçăo <b>Pauta</b>.<br/>Poderá também ar um conjunto de pautas para um ficheiro Excel. Para tal seleccione as pautas que deseja e escolha a opçăo <b>Exportar</b>.
message.showExercise.information = Aqui săo apresentadas algumas informaçőes sobre o exercício e um exemplo de uma variaçăo.<br/>Poderá inserir, escolher a cotaçăo, forma de correcçăo e a posiçăo do exercício na ficha. Poderá sempre remover o exercício, alterar a cotaçăo, forma de correcçăo ou a posiçăo do mesmo na ficha editando a ficha.
message.showStudentTest.information = Aqui pode visualizar a ficha do aluno seleccionado com as respostas submetidas até ao momento. Poderá alterar as perguntas da ficha do aluno escolhendo a opçăo <b>Alterar</b> associada ŕ pergunta que pretende alterar.
message.showStudentTestLog.information = Aqui pode visualizar os registos do aluno seleccionado. Em relaçăo ao evento "Submeter Ficha" note que ficam registados todas as tentativas do aluno, mesmo que a respota năo tenha sido aceite pelo sistema (nos casos em que a ficha é uma ficha de avaliaçăo e apenas a primeira resposta é aceite pelo sistema).
message.showTestMarks.information = Na seguinte tabela encontram-se as notas dos alunos para cada pergunta e a nota final para esta ficha. Para cada aluno poderá visualizar a ficha de trabalho, bem como o respectivo log, através das opçőes <b>Ver Ficha</b> e <b>Ver log</b>. Se desejar, poderá gerar uma folha de cálculo escolhendo a opçăo <b>Exportar para ficheiro Excel</b>.
message.showTestMarksStatistics.information = A seguinte tabela apresenta a percentagem de respostas certas, erradas e năo respondidas até ao momento.
message.showTests.information = Na seguinte tabela estăo as fichas que já foram criadas.<br/>Aqui pode, com a opçăo <b>Criar Ficha</b>, criar uma nova ficha de trabalho. Pode também <b>Editar</b> para visualizar ou alterar a ficha, <b>Remover</b> a ficha, ou <b>Duplicar</b> a ficha se desejar criar uma nova ficha igual. Poderá ainda <b>Distribuir</b> a ficha pelos alunos inscritos na disciplina.
message.showVariation.information = Pode visualizar todas as variaçőes deste exercício.<br/>Pode ver a correcçăo, cotaçăo e feedback associados a cada variaçăo e será também indicada a resposta correcta no caso de pretender utilizar as fórmulas de correçăo do Fénix.
