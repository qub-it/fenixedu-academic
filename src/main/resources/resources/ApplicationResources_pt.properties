message.gratuity.payments.reminder.text = <p><p><strong>InformańŃo dos Alunos dos cursos de 1║ e 2║ ciclo e Mestrado Integrado do {0}., ano lectivo {1}</strong></p><ul><li>Taxa de Secretaria - 25.00 &euro;</li><li>Seguro Escolar - 1.15 &euro;</li><li>Propinas - 1065.72 &euro; (excepto Mestrado Bolonha em Engenharia FarmacĻutica, Mestrado Bolonha em Sistemas Complexos de Infraestruturas de Transportes, Mestrado Bolonha em Engenharia de Estruturas, Mestrado Bolonha em ConstruńŃo e ReabilitańŃo, Mestrado Bolonha em Engenharia e GestŃo da ┴gua, Mestrado Bolonha em Engenharia de Infraestrutura de Transportes, Mestrado Bolonha em Tecnologias Biomķdicas, Mestrado Bolonha em Sistemas de InformańŃo Geogrßfica e os casos particulares de unidades curriculares isoladas e regime parcial)</li></ul><ul><li> No acto da matrĒcula ou nos 10 dias ·teis seguintes, os estudantes do {2} deverŃo fazer o pagamento do montante da propina na sua totalidade ou optar pelo pagamento de uma primeira prestańŃo. PoderŃo efectuar o pagamento do montante da propina em prestań§es no decorrer do ano lectivo da seguinte forma:<ol><li>segunda prestańŃo, atķ ao dia 15 de Marńo;</li><li>terceira prestańŃo, atķ ao dia 31 de Maio.</li></ol></li><li> Os restantes estudantes do {1}, poderŃo efectuar o pagamento do montante da propina em prestań§es no decorrer do ano lectivo da seguinte forma:<ol><li>primeira prestańŃo, atķ ao dia 31 de Dezembro</li><li>segunda prestańŃo, atķ ao dia 15 de Marńo;</li><li>terceira prestańŃo, atķ ao dia 31 de Maio.</li></ol></li><li>Os estudantes podem optar por pagar a totalidade do valor da propina durante o perĒodo de pagamento da primeira prestańŃo.</li><li> Para os estudantes que apenas se inscreverem em unidades curriculares do 2o Semestre, o pagamento da propina ķ feito na totalidade atķ 31 de Maio de 2014</li><li> Os estudantes devem efectuar os pagamentos de acordo com as instruń§es emitidas pelo {1}</li><li><a href="http://www.ist.utl.pt/pt/alunos/" target="_blank">Para mais esclarecimentos consultar o Guia Acadķmico dos Cursos dos 1║ e 2║ Ciclos e Ciclo Integrado</a></li></ul><p>Face aos regulamentos em vigor e Ós decis§es do Conselho de GestŃo do {0}, o pagamento da Taxa de Secretaria, Seguro Escolar e Propinas deverß ser realizado atravķs da Rede de Caixas Automßticas <strong>MULTIBANCO</strong> ou aos balc§es (Front-Office) dos servińos acadķmicos.<br/><br/>Faz-se notar que o atraso no pagamento das propinas implica o pagamento de juros morat¾rios mensais Ó taxa de juro legal de 1% ao mĻs. O atraso no pagamento da taxa de Secretaria implica um agravamento de 50% do seu valor.</p><p><strong>Modalidade de Pagamento</strong></p<p>O pagamento da Propina, tal como referido anteriormente, pode ser efectuado no seu valor total ou em trĻs prestań§es (para esta modalidade, consultar o Regulamento de Propinas em vigor). O mesmo nŃo acontece com o pagamento da <strong>Taxa de Secretaria</strong> e do <strong>Seguro Escolar</strong> que deve ser efectuado de uma vez na sua <strong>totalidade</strong>.</p><p>O pagamento atravķs da Rede de Caixas Automßticas <strong>MULTIBANCO</strong> poderß ser executado observando as seguintes instruń§es:</p><ol><li>Seleccione em <strong>"OUTRAS OPERAŪšES"</strong> a opńŃo <strong>"PAGAMENTO DE SERVIŪOS"</strong>.</li><li>Introduza a Entidade, ReferĻncia e Montante correspondente Ó opńŃo, de acordo com as tabelas e os prazos disponĒveis no Fķnix (<em>Portal do Estudante > Servińos Acadķmicos > Pagamentos</em>)</li><li>Termine a introduńŃo de dados confirmando com a tecla verde</li></ol><p>Guarde o talŃo que servirß como comprovativo do pagamento.</p> 
