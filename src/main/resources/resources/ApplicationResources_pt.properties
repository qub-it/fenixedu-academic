label.teacher.EditAttendsSetMembers.description = <strong>Notas :</strong><br/> - No quadro superior aparecem os elementos do conjunto, que pode retirar;<br/> - No quadro inferior aparecem os alunos que pode inserir. Estes săo os que frequentam a(s) cadeira(s) associada(s) ao agrupamento relativo ao conjunto seleccionado para visualizaçăo.
label.teacher.EditStudentGroupMembers.description = <strong>Visualizar Grupo:</strong> Permite voltar a página onde se visualiza o grupo seleccionado.<br/><br/><strong>Notas :</strong><br/> - No quadro superior aparecem os elementos do grupo, que pode retirar;<br/> - No quadro inferior aparecem os alunos que pode inserir. Estes săo os que frequentam a cadeira mas năo tęm grupo.<br/>- Como é docente, năo precisa de respeitar as capacidades máxima e mínina do grupo.
label.teacher.EditStudentGroupShift.description = <strong>Para tal deve: </strong><br/>Seleccionar o turno para o qual pretende mudar o grupo. Se năo seleccionar, o grupo permanecerá no mesmo.<br/>Enquanto docente, pode alterar o grupo para um turno cheio.
