label.teacher.viewProjectsAndLinkWithProposalsAndWaiting.description = <p><em>Gestăo de Agrupamentos</em></p><p><strong>Criar Agrupamento:</strong> Permite criar um novo agrupamento em que ŕ partida o conjunto associado contém os alunos desta disciplina.</p><p class="mvert0"><strong>Propostas Recebidas em Espera:</strong> Permite visualizar e aceitar/rejeitar propostas de agrupamentos enviadas por docentes de outras disciplinas.</p><p class="mvert0"><strong>Propostas Enviadas em Espera:</strong> Permite visualizar e desistir de propostas de agrupamentos enviadas por docentes desta disciplina.</p><p class="mvert0"><strong>Nome do Agrupamento:</strong> Permite visualizar os trnos e gerir os respectivos grupos de alunos.</p>
label.teacher.viewShiftsAndGroups.description = <p class="mbottom05"><em>Turnos do Agrupamento</em></p><p class="mtop05"><b>Visualizar Alunos Inscritos:</b> Permite visualizar todos os alunos inscritos em grupos.<br/><b>Editar Propriedades:</b> Permite editar as propriedades do agrupamento.<br/><b>Gerir Conjunto Associado:</b> Permite visualizar e gerir o conjunto de alunos que se podem inscrever no agrupamento.<br/></p><br/><p class="mbottom05"><em>Tabela</em></p><p class="mtop05"><b>Nome do Turno:</b> Permite visualizar os alunos do turno.<br/><b>Vagas:</b> corresponde ao número de grupos que ainda se pode inscrever no turno.Caso o turno năo tenha limite de grupos, na coluna aparece a expressăo "Sem limite".Como é docente, esta coluna é meramente informativa, uma vez que pode ultrapassar o limite de vagas.<br/><b>Criar Grupo:</b> Permite criar um novo grupo de alunos.<br/><b>N:</b> Permite visualizar e gerir o grupo de alunos número N.<br/></p>
label.teacher.viewShiftsAndNoGroups.description = Turnos do agrupamento seleccionado :<br/><strong>Visualizar Todos os Alunos Inscritos:</strong> Permite visualizar todos os alunos inscritos em grupos.<br/><strong>Editar Propriedades:</strong> Permite editar as propriedades do agrupamento.<br/><strong>Gerir Conjunto Associado:</strong> Permite visualizar e gerir o conjunto de alunos que se podem inscrever no agrupamento.<br/><strong>Apagar:</strong> Permite apagar o agrupamento uma vez que este năo possui grupos.<br/><br/>Coluna <b>Turno</b> da tabela : </li><br/><li><strong>Nome do Turno: </strong>Permite visualizar os alunos do turno.<br/><br/> Coluna <b>Grupos</b> da tabela : <br/><li>A sub-coluna <strong>Vagas</strong>, corresponde ao número de grupos que ainda se pode inscrever no turno.<br/>Caso o turno năo tenha limite de grupos, na coluna aparece a expressăo "Sem limite".<br/>Como é docente, esta coluna é meramente informativa, uma vez que pode ultrapassar o limite de vagas.</li><br/><li><strong>Criar Grupo:</strong> Permite criar um novo grupo.</li><br/><strong><li>N :</strong> Permite visualizar e gerir o grupo número <b>N.</li></b>
label.teacher.viewStudentGroupInformation.normalShift.description = Nesta página visualiza-se e gere-se o grupo seleccionado.<br/><br/><strong>Visualizar Turnos:</strong> Permite voltar a página onde se visualizam os turnos do agrupamento.<br/><strong>Enviar Mail aos Alunos:</strong> Permite enviar um mail a todos os elementos do grupo.<br/><strong>Alterar Membros:</strong> Permite inserir e retirar elementos do grupo.<br/> <strong>Alterar Turno:</strong> Permite alterar o turno do grupo.
