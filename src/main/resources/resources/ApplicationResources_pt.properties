label.identification.card.production.state.three = A SIBS / SANTANDER emitiu o seu cartŃo no dia {0}. \nSe o cartŃo nŃo for bancßrio serß enviado para o balcŃo do banco SANTANDER dentro de poucos dias onde poderß proceder ao seu levantamento, caso contrßrio serß enviado para a sua morada.
