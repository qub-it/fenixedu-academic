label.teacher.viewProjects.instructions = <p><em>Conceitos Gerais</em></p><p><strong>Agrupamento:</strong> um agrupamento ķ o grupo (que terß o nome do trabalho ou projecto) que engloba os grupos de alunos.</p><p><strong>Grupo:</strong> grupo formado por alunos dentro de um agrupamento.</p><p style="margin-top: 1em;"><em>Tipos de Agrupamento</em></p><p><strong>PolĒtica At¾mica:</strong> Este tipo de inscrińŃo obriga os alunos formarem os grupos pessoalmente antes de se inscreverem. A inscrińŃo dos alunos num grupo ķ feita em simultŌneo por um ·nico aluno. Os alunos podem-se inscrever e retirar dos grupos desde que nŃo violem o n·mero mĒnimo/mßximo de alunos que o agrupamento permite.</p><p><strong>PolĒtica Individual:</strong> Este tipo de inscrińŃo permite aos alunos inscreverem-se e retirarem-se dos grupos individual e livremente desde que nŃo ultrapassem o valor do n·mero mßximo de alunos permitido.</p>
