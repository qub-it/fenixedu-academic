label.credits.warning = Os créditos de cada área săo contabilizados da seguinte forma: créditos de todas as disciplinas aprovadas na área em questăo + créditos de todas as disciplinas acabadas de inscrever na mesma área.<br/><br/>Quando existem disciplinas que podem pertencer tanto ŕ área de especializaçăo como ŕ área secundária, o programa năo sabe ŕ partida em qual das áreas o aluno deseja fazer essas disciplinas, ou seja, năo sabe em qual das áreas deve atribuir os respectivos créditos.<br/><br/>Desta forma, o programa detecta se as áreas poderăo ficar terminadas com a contabilizaçăo daqueles créditos, caso em que os atribuirá correctamente conforme o pretendido pelo aluno.<br/><br/>Se pelo contrário nenhuma das áreas poderá ser terminada com a contabilizaçăo daqueles créditos, os mesmos serăo repartidos pelas duas áreas (sem nunca poder ultrapassar o máximo de um grupo) até que o aluno faça um número suficiente de disciplinas para que se conclua se as áreas poderăo ser terminadas.<br/><br/>Consequentemente, os totais de créditos aqui apresentados poderăo năo corresponder exactamente ao que seria esperado pelo aluno, o que no entanto năo quer dizer que estejam a ser mal contabilizados.
