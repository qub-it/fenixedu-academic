message.expiration.warning.long = A password única permite a entrada em vários serviços disponibilizados pelo CIIST como sejam o fenix, o acesso á rede sem fios, o serviço de proxy autenticado, o acesso a um cluster UNIX, espaço em disco numa área AFS, e o serviço de mail.<br/>Sendo a password do fénix única para todos estes serviços, estará mais exposta a possíveis tentativas de abuso por terceiros. Por este motivo, é essencial garantir a robustez e qualidade desta password. Também por este motivo a validade da password tem de ser necessariamente limitada.<br/>A mudança periódica de password é uma forma de reduzir a duraçăo e o impacto de uma possível password comprometida.
message.expiration.warning.short = A mudança periódica de password é uma forma de reduzir a duraçăo e o impacto de uma possível password comprometida.
