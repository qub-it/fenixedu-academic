label.teacher.importGroupProperties.description = DescrińŃo :<br/><br/><strong>Aceitar: </strong>Ao seleccionar esta opńŃo estß a associar-se Ós cadeiras em co-avaliańŃo no agrupamento proposto. Serß permitida a formańŃo de grupos com alunos das diferentes cadeiras de acordo com a permissŃo de inscrińŃo, ou seja, de acordo com a pertenńa ou nŃo dos alunos ao conjunto associado ao agrupamento. Inicialmente o conjunto passarß a conter todos os alunos desta cadeira, posteriormente poderß gerir os elementos do conjunto (incluindo os das outras cadeiras).<br/><br/><strong>Rejeitar: </strong> Elimina a proposta recebida.<br/><br/>Em ambos os casos os professores das disciplinas em co-avaliańŃo neste agrupamento serŃo avisados da sua decisŃo.
