label.teacher.importGroupProperties.description = Descriçăo :<br/><br/><strong>Aceitar: </strong>Ao seleccionar esta opçăo está a associar-se ŕs cadeiras em co-avaliaçăo no agrupamento proposto. Será permitida a formaçăo de grupos com alunos das diferentes cadeiras de acordo com a permissăo de inscriçăo, ou seja, de acordo com a pertença ou năo dos alunos ao conjunto associado ao agrupamento. Inicialmente o conjunto passará a conter todos os alunos desta cadeira, posteriormente poderá gerir os elementos do conjunto (incluindo os das outras cadeiras).<br/><br/><strong>Rejeitar: </strong> Elimina a proposta recebida.<br/><br/>Em ambos os casos os professores das disciplinas em co-avaliaçăo neste agrupamento serăo avisados da sua decisăo.
