message.showAvailableQuestions.information = Na seguinte tabela estŃo os exercĒcios disponĒveis para inserir na ficha de trabalho.<br/><br/>Se primir na descrińŃo de um exercĒcio, poderß ver outras informań§es disponĒveis acerca do exercĒcio, ver um exemplo de uma variańŃo e poderß tambķm inseri-lo na ficha.<br/>Para inserir exercĒcios na ficha de trabalho, seleccione os exercĒcios que pretende e escolha <b>Inserir</b>.<br/><br/>Ap¾s inserir os exercĒcios que pretende, prima <b>Continuar</b> para ver a ficha e onde poderß alterar a cotacŃo ou a posicŃo dos exercĒcios da ficha. Poderß sempre voltar a esta pßgina se desejar inserir novos exercĒcios.<br/>Se desejar cancelar, prima <b>Remover Ficha</b>.
